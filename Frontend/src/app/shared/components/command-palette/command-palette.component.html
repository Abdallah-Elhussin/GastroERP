<div 
  *ngIf="isOpen()" 
  class="fixed inset-0 bg-black bg-opacity-40 backdrop-blur-sm z-[999] flex items-start justify-center p-4 pt-20 animate-fade-in"
  (click)="closePalette()"
>
  <div 
    class="bg-[var(--bg-surface)] border border-[var(--border-color)] max-w-xl w-full rounded-2xl shadow-2xl overflow-hidden flex flex-col animate-scale-up"
    (click)="$event.stopPropagation()"
  >
    <!-- Search Input Row -->
    <div class="h-14 border-b border-[var(--border-color)] px-4 flex items-center gap-3">
      <mat-icon class="text-[var(--text-muted)] text-base">search</mat-icon>
      <input 
        type="text" 
        [value]="searchQuery()"
        (input)="onSearchInput($any($event.target).value)"
        [placeholder]="t('cmd.placeholder')"
        class="flex-1 bg-transparent border-none text-[var(--text-primary)] text-xs focus:outline-none placeholder-[var(--text-muted)]"
        #searchInput
        (focus)="searchInput.select()"
      />
      <span class="text-[9px] bg-[var(--bg-canvas)] border border-[var(--border-color)] text-[var(--text-muted)] px-1.5 py-0.5 rounded font-bold uppercase select-none">ESC</span>
    </div>

    <!-- Search Results list -->
    <div class="max-h-96 overflow-y-auto p-2 flex flex-col gap-1">
      <div 
        *ngFor="let item of filteredItems(); let i = index"
        (click)="item.action()"
        class="px-4 py-3 rounded-xl flex items-center justify-between hover:bg-[var(--bg-surface-hover)] cursor-pointer transition-colors text-left"
        [class.bg-[var(--bg-surface-hover)]]="selectedIndex() === i"
      >
        <div class="flex items-center gap-3">
          <span class="w-8 h-8 rounded-lg bg-[var(--bg-canvas)] border border-[var(--border-color)] text-[var(--text-secondary)] flex items-center justify-center">
            <mat-icon class="text-sm">{{ item.icon }}</mat-icon>
          </span>
          <div class="flex flex-col">
            <span class="text-xs font-semibold text-[var(--text-primary)]">{{ getItemName(item) }}</span>
            <span class="text-[9px] text-[var(--text-muted)] mt-0.5 uppercase tracking-wider font-bold">{{ t(item.categoryKey) }}</span>
          </div>
        </div>
        <mat-icon class="text-xs text-[var(--text-muted)]">subdirectory_arrow_left</mat-icon>
      </div>

      <div *ngIf="filteredItems().length === 0" class="text-center py-10 text-[var(--text-muted)] text-xs flex flex-col items-center gap-2 select-none">
        <mat-icon class="text-2xl">search_off</mat-icon>
        <span>{{ t('cmd.noResults') }}</span>
      </div>
    </div>

    <!-- Footer Guide bar -->
    <div class="h-10 bg-[var(--bg-canvas)] border-t border-[var(--border-color)] px-4 flex items-center justify-between text-[9px] text-[var(--text-muted)] font-semibold select-none">
      <span>{{ t('cmd.footer') }}</span>
      <span>{{ t('cmd.title') }}</span>
    </div>
  </div>
</div>
