<div class="flex flex-col gap-6 h-full text-left">
  
  <div class="flex flex-col select-none">
    <span class="text-xs font-bold text-[var(--text-primary)]">{{ t('workflow.approvals.title') }}</span>
    <span class="text-[10px] text-[var(--text-muted)]">{{ t('workflow.approvals.subtitle') }}</span>
  </div>

  <!-- Requests list -->
  <div class="flex flex-col gap-4">
    <div 
      *ngFor="let request of requests()"
      class="bg-[var(--bg-surface)] border border-[var(--border-color)] rounded-2xl p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shadow-sm"
    >
      <!-- Requester & details -->
      <div class="flex items-start gap-4">
        <img [src]="request.avatar" [alt]="request.requester" class="w-10 h-10 rounded-full object-cover border border-[var(--border-color)] flex-shrink-0" />
        <div class="flex flex-col">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-xs font-extrabold text-[var(--text-primary)]">{{ request.requester }}</span>
            <span class="bg-[var(--bg-canvas)] border border-[var(--border-color)] text-[var(--text-secondary)] px-2 py-0.5 rounded text-[8px] font-extrabold uppercase tracking-wide">
              {{ request.type }}
            </span>
            <span class="text-[10px] font-bold text-[var(--accent-color)]">{{ request.meta }}</span>
          </div>
          <p class="text-xs text-[var(--text-secondary)] mt-1.5 leading-snug">{{ request.details }}</p>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="flex items-center gap-2 select-none self-end sm:self-center">
        <ng-container *ngIf="request.status === 'pending'; else statusBadge">
          <button 
            type="button"
            (click)="resolveRequest(request.id, 'rejected')"
            class="bg-[var(--bg-canvas)] hover:bg-[var(--bg-surface-hover)] border border-[var(--border-color)] text-red-500 px-4 py-2 rounded-xl text-[10px] font-bold cursor-pointer flex items-center gap-1"
          >
            <mat-icon class="text-sm">close</mat-icon>
            <span>{{ t('common.reject') }}</span>
          </button>
          
          <button 
            type="button"
            (click)="resolveRequest(request.id, 'approved')"
            class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-md cursor-pointer flex items-center gap-1"
          >
            <mat-icon class="text-sm">check</mat-icon>
            <span>{{ t('common.approve') }}</span>
          </button>
        </ng-container>

        <ng-template #statusBadge>
          <span 
            [class.bg-emerald-500]="request.status === 'approved'"
            [class.bg-red-500]="request.status === 'rejected'"
            class="text-white font-extrabold text-[8px] px-2.5 py-1 rounded-full uppercase tracking-wider"
          >
            {{ getStatusLabel(request.status) }}
          </span>
        </ng-template>
      </div>

    </div>
  </div>

</div>
