<app-public-layout>
  <div class="py-12 px-4 sm:px-6 lg:px-8 bg-[var(--bg-canvas)] transition-colors duration-200">
    <div class="max-w-7xl mx-auto w-full flex-1 flex flex-col justify-center items-center">
      <!-- Main Hero Content -->
      <main class="text-center max-w-4xl mx-auto">
        <!-- Top Badge Pill -->
        <div class="inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full bg-[var(--accent-color)] bg-opacity-10 text-[var(--accent-color)] text-xs font-semibold mb-6 animate-pulse select-none">
          <mat-icon class="text-xs">star</mat-icon>
          <span>{{ t('landing.badge') }}</span>
        </div>

        <!-- Main Title -->
        <h1 class="text-4xl sm:text-6xl font-extrabold tracking-tight text-[var(--text-primary)] leading-tight mb-6">
          {{ t('landing.title') }} 
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-[var(--accent-color)] to-emerald-500 italic font-serif font-medium">
            {{ t('landing.subtitle') }}
          </span>
        </h1>

        <!-- Description Paragraph -->
        <p class="text-lg sm:text-xl text-[var(--text-secondary)] max-w-2xl mx-auto leading-relaxed mb-10">
          {{ t('landing.description') }}
        </p>

        <!-- CTA Buttons -->
        <div class="flex flex-col sm:flex-row justify-center items-center gap-4 mb-20">
          <button 
            routerLink="/setup"
            class="w-full sm:w-auto bg-[var(--primary-color)] text-[var(--primary-contrast)] hover:bg-[var(--primary-color-hover)] px-8 py-3.5 rounded-full font-bold text-base shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2 cursor-pointer"
          >
            <span>{{ t('landing.trial') }}</span>
            <mat-icon class="text-sm">arrow_forward</mat-icon>
          </button>
          <button 
            routerLink="/pos"
            class="w-full sm:w-auto bg-[var(--bg-surface)] text-[var(--text-primary)] hover:bg-[var(--bg-surface-hover)] border border-[var(--border-color)] px-8 py-3.5 rounded-full font-bold text-base shadow-sm hover:shadow transition-all flex items-center justify-center gap-2 cursor-pointer"
          >
            <span>{{ t('landing.demo') }}</span>
          </button>
        </div>

        <!-- Real Interactive Canvas Dashboard Mockup -->
        <div class="relative w-full border border-[var(--border-color)] rounded-2xl shadow-2xl overflow-hidden bg-[var(--bg-surface-elevated)] max-w-5xl mx-auto transition-transform hover:scale-[1.01] duration-300">
          <!-- Mock Browser Top Bar -->
          <div class="h-10 bg-[var(--bg-surface)] border-b border-[var(--border-color)] flex items-center px-4 justify-between select-none">
            <div class="flex items-center gap-1.5">
              <span class="w-3 h-3 rounded-full bg-red-400"></span>
              <span class="w-3 h-3 rounded-full bg-yellow-400"></span>
              <span class="w-3 h-3 rounded-full bg-green-400"></span>
            </div>
            <div class="bg-[var(--bg-canvas)] text-[var(--text-muted)] text-[10px] px-8 py-1 rounded border border-[var(--border-color)] tracking-wide font-mono w-64 truncate">
              https://gastroerp.io/dashboard
            </div>
            <div class="flex items-center gap-2 text-[var(--text-muted)]">
              <mat-icon class="text-xs">share</mat-icon>
            </div>
          </div>

          <!-- Mock Application Content Body -->
          <div class="h-[420px] flex overflow-hidden text-left bg-[var(--bg-canvas)]">
            <!-- Sidebar -->
            <div class="w-48 bg-[var(--bg-surface)] border-r border-[var(--border-color)] p-4 flex flex-col justify-between hidden sm:flex">
              <div class="flex flex-col gap-3">
                <div class="h-6 w-24 bg-[var(--border-color)] rounded animate-pulse mb-6"></div>
                <div class="flex items-center gap-2" *ngFor="let item of [1,2,3,4,5]">
                  <span class="w-5 h-5 rounded bg-[var(--bg-canvas)]"></span>
                  <span class="h-3 w-16 bg-[var(--border-color)] rounded"></span>
                </div>
              </div>
              <div class="h-8 w-full bg-[var(--bg-canvas)] rounded"></div>
            </div>

            <!-- Content Grid Panel -->
            <div class="flex-1 p-6 flex flex-col gap-6 overflow-y-auto">
              <div class="flex justify-between items-center">
                <div>
                  <div class="h-5 w-32 bg-[var(--border-color)] rounded mb-1"></div>
                  <div class="h-3 w-48 bg-[var(--border-color-muted)] rounded"></div>
                </div>
                <div class="h-8 w-24 bg-[var(--border-color)] rounded-full"></div>
              </div>

              <!-- Stats Boxes -->
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-[var(--bg-surface)] border border-[var(--border-color)] rounded-xl p-4 flex flex-col gap-2" *ngFor="let stat of mockStats()">
                  <span class="text-xs text-[var(--text-muted)] font-medium">{{ stat.label }}</span>
                  <span class="text-xl font-bold" [ngClass]="stat.color">{{ stat.val }}</span>
                </div>
              </div>

              <!-- Graph Representation Layout -->
              <div class="bg-[var(--bg-surface)] border border-[var(--border-color)] rounded-xl p-4 flex-1 flex flex-col gap-3 min-h-[150px]">
                <div class="h-4 w-32 bg-[var(--border-color)] rounded"></div>
                <div class="flex-1 flex items-end justify-between gap-2 px-4 py-2 border-b border-[var(--border-color-muted)]">
                  <div class="w-full bg-[var(--border-color)] rounded-t hover:bg-[var(--accent-color)] transition-all cursor-pointer" [style.height.%]="h" *ngFor="let h of [30, 45, 60, 40, 85, 70, 90, 50, 65, 80]"></div>
                </div>
                <div class="flex justify-between text-[10px] text-[var(--text-muted)] px-1">
                  <span>08:00 AM</span>
                  <span>12:00 PM</span>
                  <span>04:00 PM</span>
                  <span>08:00 PM</span>
                </div>
              </div>

            </div>
          </div>
        </div>

      </main>
    </div>
  </div>
</app-public-layout>
